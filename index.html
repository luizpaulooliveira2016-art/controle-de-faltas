<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e40af">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Controle de Faltas</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--pri:#2563eb;--pri-d:#1e40af;--pri-l:#dbeafe;--pri-xl:#eff6ff;
--suc:#16a34a;--suc-l:#dcfce7;--suc-xl:#f0fdf4;
--dan:#dc2626;--dan-l:#fee2e2;--dan-xl:#fef2f2;
--war:#f59e0b;--war-l:#fef3c7;--war-xl:#fffbeb;
--ora:#ea580c;--ora-l:#ffedd5;--ora-xl:#fff7ed;
--pur:#7c3aed;--pur-l:#ede9fe;
--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
--white:#fff;
--sh:0 4px 20px rgba(0,0,0,.06);--sh-lg:0 8px 30px rgba(0,0,0,.1);
--r:20px;--r-sm:14px;--r-xs:10px;--r-full:9999px;
--tr:all .2s cubic-bezier(.4,0,.2,1)
}
html{scroll-behavior:smooth}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
background:linear-gradient(170deg,#eef2ff 0%,#f8fafc 40%,#fdf2f8 100%);
color:var(--g800);min-height:100vh;padding-bottom:90px;
-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased
}
.header{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;padding:18px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(37,99,235,.25)}
.header-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-sub{font-size:12px;opacity:.85;margin-top:2px}
.page{display:none;padding:16px;animation:fadeSlide .35s ease}
.page.active{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hero{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#3b82f6 100%);color:#fff;padding:32px 24px 36px;margin:-16px -16px 24px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60%;right:-25%;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero::after{content:'';position:absolute;bottom:-50%;left:-15%;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-logo{font-size:48px;margin-bottom:6px;position:relative;z-index:1}
.hero-title{font-size:26px;font-weight:800;letter-spacing:-.5px;position:relative;z-index:1}
.hero-sub{font-size:13px;opacity:.85;margin-top:6px;position:relative;z-index:1}
.stats-row{display:flex;gap:10px;margin-top:24px;position:relative;z-index:1;justify-content:center;flex-wrap:wrap}
.stat-card{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);border-radius:var(--r-sm);padding:14px 18px;min-width:72px;text-align:center;cursor:pointer;transition:var(--tr)}
.stat-card:active{transform:scale(.95)}
.stat-num{font-size:28px;font-weight:800;line-height:1}
.stat-label{font-size:10px;opacity:.8;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.sync-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);border-radius:var(--r-full);padding:8px 18px;font-size:12px;font-weight:600;margin-top:18px;cursor:pointer;position:relative;z-index:1;transition:var(--tr)}
.sync-pill:active{transform:scale(.95)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
.sync-dot.off{background:#fbbf24;animation:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.quick-btn{background:var(--white);border:none;border-radius:var(--r);padding:24px 14px;text-align:center;cursor:pointer;transition:var(--tr);box-shadow:var(--sh);position:relative;overflow:hidden}
.quick-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0}
.quick-btn:active{transform:scale(.96);box-shadow:var(--sh-lg)}
.quick-btn.primary{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff}
.quick-btn.primary::before{background:rgba(255,255,255,.3)}
.quick-btn.success::before{background:var(--suc)}
.quick-btn.warning::before{background:var(--war)}
.quick-btn.orange::before{background:var(--ora)}
.quick-icon{font-size:34px;margin-bottom:10px}
.quick-text{font-size:13px;font-weight:700}
.quick-btn.primary .quick-text{color:#fff}
.quick-btn.success .quick-text{color:var(--suc)}
.quick-btn.warning .quick-text{color:var(--war)}
.quick-btn.orange .quick-text{color:var(--ora)}
.sec-actions{display:flex;gap:10px;margin-bottom:24px}
.sec-btn{flex:1;background:var(--white);border:none;border-radius:var(--r-sm);padding:14px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--g700);box-shadow:var(--sh);transition:var(--tr)}
.sec-btn:active{transform:scale(.97)}
.home-section{margin-bottom:24px}
.home-sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.home-sec-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.home-sec-count{font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--r-full);background:var(--g200);color:var(--g600)}
.home-sec-link{font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;padding:8px 14px;border-radius:var(--r-full);border:none;transition:var(--tr)}
.home-sec-link:active{transform:scale(.95)}
.home-sec-link.pri{background:var(--pri-l);color:var(--pri)}
.home-sec-link.ora{background:var(--ora-l);color:var(--ora)}
.home-sec-link.war{background:var(--war-l);color:var(--war)}
.carousel{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.carousel::-webkit-scrollbar{display:none}
.carousel-card{flex:0 0 260px;scroll-snap-align:start;background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid rgba(0,0,0,.05);transition:var(--tr);cursor:pointer;position:relative;overflow:hidden}
.carousel-card:active{transform:scale(.97)}
.carousel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0}
.carousel-card.urgent::before{background:var(--dan)}
.carousel-card.troca::before{background:var(--ora)}
.carousel-card.venc-danger::before{background:var(--dan)}
.carousel-card.venc-warn::before{background:var(--war)}
.cc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cc-img{width:50px;height:50px;border-radius:var(--r-xs);background:var(--g50);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;border:1px solid var(--g200)}
.cc-img img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:13px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-sub{font-size:11px;color:var(--g500);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc-badge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:var(--r-full);white-space:nowrap;flex-shrink:0;text-transform:uppercase}
.cc-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--g100);font-size:11px}
.cc-bottom-left{color:var(--g500)}
.cc-bottom-right{font-weight:700}
.carousel-more{flex:0 0 120px;scroll-snap-align:start;background:var(--g50);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:2px dashed var(--g300);min-height:140px}
.carousel-more:active{background:var(--g100)}
.carousel-more-icon{font-size:28px;opacity:.6}
.carousel-more-text{font-size:12px;font-weight:700;color:var(--g500);text-align:center}
.card{background:var(--white);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--sh);border:1px solid rgba(0,0,0,.04)}
.prod-card{background:var(--white);border-radius:var(--r-sm);padding:14px;margin-bottom:10px;border:1px solid var(--g200);display:flex;align-items:center;gap:14px;transition:var(--tr)}
.prod-card.urgent{border-left:4px solid var(--dan);background:var(--dan-xl)}
.prod-card.medium{border-left:4px solid var(--war);background:var(--war-xl)}
.prod-card.low{border-left:4px solid var(--suc);background:var(--suc-xl)}
.prod-card.expiring{border-left:4px solid var(--ora);background:var(--ora-xl)}
.prod-card.troca{border-left:4px solid var(--ora)}
.prod-card.troca-done{opacity:.55}
.prod-card.clickable{cursor:pointer}
.prod-card.clickable:active{transform:scale(.98)}
.prod-img{width:56px;height:56px;background:var(--g50);border-radius:var(--r-xs);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;border:1px solid var(--g200)}
.prod-img img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:14px;font-weight:700;line-height:1.35}
.prod-meta{font-size:12px;color:var(--g500);margin-top:3px}
.prod-meta.ora{color:var(--ora);font-weight:600}
.prod-meta.blue{color:var(--pri)}
.prod-meta.green{color:var(--suc);font-weight:600}
.prod-code{font-size:11px;color:var(--g400);margin-top:3px;font-family:monospace}
.prod-badge{font-size:10px;font-weight:800;padding:5px 12px;border-radius:var(--r-full);white-space:nowrap;flex-shrink:0;text-transform:uppercase}
.b-dan{background:var(--dan-l);color:var(--dan)}
.b-war{background:var(--war-l);color:var(--war)}
.b-suc{background:var(--suc-l);color:var(--suc)}
.b-info{background:var(--pri-l);color:var(--pri)}
.b-ora{background:var(--ora-l);color:var(--ora)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 22px;border-radius:var(--r-sm);font-size:15px;font-weight:700;border:none;cursor:pointer;transition:var(--tr);min-height:50px}
.btn:active{transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.btn-suc{background:linear-gradient(135deg,var(--suc),#15803d);color:#fff;box-shadow:0 4px 14px rgba(22,163,74,.3)}
.btn-dan{background:linear-gradient(135deg,var(--dan),#b91c1c);color:#fff}
.btn-ora{background:linear-gradient(135deg,var(--ora),#c2410c);color:#fff;box-shadow:0 4px 14px rgba(234,88,12,.3)}
.btn-gray{background:var(--g200);color:var(--g700)}
.btn-outline{background:#fff;color:var(--pri);border:2px solid var(--pri)}
.btn-scan{background:linear-gradient(135deg,var(--pur),#5b21b6);color:#fff;border:none;border-radius:var(--r-sm);padding:14px 18px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:var(--tr);box-shadow:0 4px 14px rgba(124,58,237,.3)}
.btn-scan:active{transform:scale(.96)}
.btn-block{width:100%}.btn-sm{padding:10px 16px;font-size:13px;min-height:42px}.btn-lg{padding:18px 28px;font-size:17px}
.fg{margin-bottom:18px}
.fl{display:block;font-size:13px;font-weight:700;color:var(--g700);margin-bottom:8px}
.fi,.fs{width:100%;padding:14px 16px;border:2px solid var(--g200);border-radius:var(--r-sm);font-size:16px;background:var(--white);transition:var(--tr);-webkit-appearance:none}
.fi:focus,.fs:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 4px rgba(37,99,235,.1)}
.fi::placeholder{color:var(--g400)}
textarea.fi{min-height:100px;resize:vertical}
.search-box{position:relative;margin-bottom:16px}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;z-index:1}
.search-input{width:100%;padding:14px 58px 14px 48px;border:2px solid var(--g200);border-radius:var(--r);font-size:16px;background:var(--white);transition:var(--tr)}
.search-input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 4px rgba(37,99,235,.08)}
.scan-inline{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:linear-gradient(135deg,var(--pur),#5b21b6);border:none;border-radius:var(--r-xs);padding:8px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:var(--tr)}
.scan-inline:active{transform:translateY(-50%) scale(.92)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:var(--white);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:sheetUp .35s cubic-bezier(.32,.72,0,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.modal-header{padding:20px;border-bottom:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);z-index:10;border-radius:var(--r) var(--r) 0 0}
.modal-title{font-size:18px;font-weight:800}
.modal-close{width:38px;height:38px;border-radius:var(--r-xs);background:var(--g100);border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:active{background:var(--g200)}
.modal-body{padding:20px}
.scanner-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:16px;background:#000;box-shadow:var(--sh-lg)}
.scanner-status{background:rgba(0,0,0,.8);color:#fff;padding:12px 16px;text-align:center;font-size:13px;font-weight:600}
.online-card{background:var(--white);border-radius:var(--r);border:2px solid var(--suc);overflow:hidden;margin-bottom:18px;box-shadow:var(--sh)}
.online-header{background:linear-gradient(135deg,var(--suc-l),var(--suc-xl));padding:14px 18px;display:flex;align-items:center;gap:8px;font-weight:700;color:var(--suc);font-size:14px}
.online-body{padding:18px}
.online-imgs{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.online-imgs::-webkit-scrollbar{display:none}
.online-img{width:76px;height:76px;flex-shrink:0;border:2px solid var(--g200);border-radius:var(--r-xs);overflow:hidden;cursor:pointer;transition:var(--tr);background:var(--white)}
.online-img.sel{border-color:var(--pri);transform:scale(1.08)}
.online-img img{width:100%;height:100%;object-fit:contain}
.online-info{font-size:13px;color:var(--g700)}
.online-info p{margin-bottom:6px}
.toast-wrap{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);z-index:2000;width:90%;max-width:400px}
.toast{padding:16px 22px;border-radius:var(--r-sm);color:#fff;font-weight:700;text-align:center;margin-bottom:8px;font-size:14px;animation:toastPop .35s;box-shadow:var(--sh-lg)}
@keyframes toastPop{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.toast.success{background:linear-gradient(135deg,var(--suc),#15803d)}
.toast.error{background:linear-gradient(135deg,var(--dan),#b91c1c)}
.toast.warning{background:linear-gradient(135deg,var(--war),#d97706)}
.toast.info{background:linear-gradient(135deg,var(--pri),var(--pri-d))}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:3000}
.loading.show{display:flex}
.spinner{width:48px;height:48px;border:4px solid var(--g200);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
.ls-spinner{width:40px;height:40px;border:4px solid var(--g200);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--g700);font-weight:600}
.loading-search{display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px;text-align:center}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);display:flex;border-top:1px solid var(--g200);z-index:100;padding:4px 6px env(safe-area-inset-bottom);box-shadow:0 -4px 24px rgba(0,0,0,.06)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;background:none;border:none;color:var(--g400);font-size:10px;font-weight:700;cursor:pointer;gap:3px;border-radius:var(--r-xs);transition:var(--tr)}
.tab-btn.active{color:var(--pri);background:var(--pri-xl)}
.tab-icon{font-size:22px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{padding:9px 18px;border-radius:var(--r-full);font-size:13px;font-weight:700;white-space:nowrap;background:var(--white);color:var(--g600);border:2px solid var(--g200);cursor:pointer;flex-shrink:0;transition:var(--tr)}
.chip:active{transform:scale(.95)}
.chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.chip.active.ora{background:var(--ora);border-color:var(--ora)}
.card-actions{display:flex;gap:8px;margin-bottom:12px;padding:10px 14px;background:var(--g50);border-radius:0 0 var(--r-sm) var(--r-sm);border:1px solid var(--g200);border-top:none;margin-top:-10px}
.act-btn{flex:1;padding:10px;border:none;border-radius:var(--r-xs);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:var(--tr)}
.act-btn:active{transform:scale(.95)}
.act-btn.edit{background:var(--pri-l);color:var(--pri)}
.act-btn.del{background:var(--dan-l);color:var(--dan)}
.act-btn.add{background:var(--suc-l);color:var(--suc)}
.act-btn.ora{background:var(--ora-l);color:var(--ora)}
.act-btn.gray{background:var(--g200);color:var(--g600)}
.prio-sel{display:flex;gap:10px}
.prio-btn{flex:1;padding:14px;border:2px solid var(--g200);border-radius:var(--r-sm);background:var(--white);cursor:pointer;text-align:center;font-size:12px;font-weight:700;transition:var(--tr)}
.prio-btn.alta.sel{border-color:var(--dan);background:var(--dan-l);color:var(--dan);transform:scale(1.05)}
.prio-btn.media.sel{border-color:var(--war);background:var(--war-l);color:var(--war);transform:scale(1.05)}
.prio-btn.baixa.sel{border-color:var(--suc);background:var(--suc-l);color:var(--suc);transform:scale(1.05)}
.mot-btn{width:100%;padding:16px;border:2px solid transparent;border-radius:var(--r-sm);background:var(--g50);cursor:pointer;text-align:left;font-weight:600;transition:var(--tr);display:flex;align-items:center;gap:14px;margin-bottom:10px;color:var(--g600)}
.mot-btn.sel.avaria{border-color:var(--dan);background:var(--dan-l);color:var(--dan)}
.mot-btn.sel.vencimento{border-color:var(--war);background:var(--war-l);color:var(--war)}
.mot-btn.sel.outros{border-color:var(--pri);background:var(--pri-l);color:var(--pri)}
.mot-icon{font-size:26px}.mot-info{flex:1}.mot-title{font-size:14px}.mot-desc{font-size:11px;font-weight:400;opacity:.7;margin-top:3px}
.img-prev{width:130px;height:130px;margin:0 auto 18px;border-radius:var(--r-sm);background:var(--g50);display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden;border:2px dashed var(--g300)}
.img-prev img{width:100%;height:100%;object-fit:contain;border-radius:10px}
.img-prev.has{border-style:solid;border-color:var(--suc);background:var(--suc-xl)}
.conn-banner{background:var(--war);color:#fff;padding:10px 16px;text-align:center;font-size:13px;font-weight:700;display:none;position:fixed;top:0;left:0;right:0;z-index:200}
.conn-banner.show{display:block}

const fbCfg={apiKey:"AIzaSyAFYDsRg1jgr2mP6UvEQofwoWH0Mi2iTps",authDomain:"controle-faltas-d6709.firebaseapp.com",databaseURL:"https://controle-faltas-d6709-default-rtdb.firebaseio.com",projectId:"controle-faltas-d6709",storageBucket:"controle-faltas-d6709.firebasestorage.app",messagingSenderId:"1063821814181",appId:"1:1063821814181:web:4aa8451fd799590d93e04c"};
let db=null,isOnline=navigator.onLine;
try{firebase.initializeApp(fbCfg);db=firebase.database()}catch(e){}
let produtos=[],faltas=[],vencimentos=[],trocas=[],config={};

const pageMap={home:'pageHome',produtos:'pageProdutos',faltas:'pageFaltas',trocas:'pageTrocas',vencimentos:'pageVencimentos',config:'pageConfig'};

function navTo(pg,push=true){stopAllScan();currentPage=pg;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(pageMap[pg]).classList.add('active');document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));const ti=tabMap[pg];if(ti!==undefined)document.querySelectorAll('.tab-btn')[ti].classList.add('active');if(push)history.pushState({page:pg},pg);renderPage(pg);window.scrollTo(0,0)}
function renderPage(pg){if(pg==='home')renderHome();else if(pg==='produtos')renderProdutos();else if(pg==='faltas')renderFaltas();else if(pg==='trocas')renderTrocas();else if(pg==='vencimentos')renderVenc()}
window.addEventListener('popstate',e=>{stopAllScan();closeModal();navTo(e.state?.page||'home',false)});

document.addEventListener('DOMContentLoaded',async()=>{history.replaceState({page:'home'},'home');showLoad('Conectando...');loadCfg();await loadAll();setupRT();renderHome();hideLoad();window.addEventListener('online',()=>{isOnline=true;updConn();updSync('on');syncData()});window.addEventListener('offline',()=>{isOnline=false;updConn();updSync('off')});updConn();updSync(isOnline?'on':'off')});

function setupRT(){if(!db)return;['produtos','faltas','vencimentos','trocas'].forEach(c=>{db.ref(c).on('value',s=>{const d=s.val()?Object.values(s.val()):[];if(c==='produtos'&&JSON.stringify(d)!==JSON.stringify(produtos)){produtos=d;localStorage.setItem(c,JSON.stringify(d));renderPage(currentPage)}else if(c==='faltas'&&JSON.stringify(d)!==JSON.stringify(faltas)){faltas=d;localStorage.setItem(c,JSON.stringify(d));renderPage(currentPage)}else if(c==='vencimentos'&&JSON.stringify(d)!==JSON.stringify(vencimentos)){vencimentos=d;localStorage.setItem(c,JSON.stringify(d));renderPage(currentPage)}else if(c==='trocas'&&JSON.stringify(d)!==JSON.stringify(trocas)){trocas=d;localStorage.setItem(c,JSON.stringify(d));renderPage(currentPage)}})})}
function updSync(s){const d=document.getElementById('syncDot'),t=document.getElementById('syncText');if(!d)return;if(s==='on'){d.classList.remove('off');d.style.background='';t.textContent='Sincronizado'}else if(s==='sync'){d.style.background='#60a5fa';t.textContent='Sincronizando...'}else{d.classList.add('off');t.textContent='Offline'}}
async function loadAll(){if(db&&isOnline){try{const[a,b,c,d]=await Promise.all([db.ref('produtos').once('value'),db.ref('faltas').once('value'),db.ref('vencimentos').once('value'),db.ref('trocas').once('value')]);produtos=a.val()?Object.values(a.val()):[];faltas=b.val()?Object.values(b.val()):[];vencimentos=c.val()?Object.values(c.val()):[];trocas=d.val()?Object.values(d.val()):[];['produtos','faltas','vencimentos','trocas'].forEach(k=>localStorage.setItem(k,JSON.stringify(eval(k))))}catch(e){loadLocal()}}else loadLocal()}
function loadLocal(){produtos=JP('produtos');faltas=JP('faltas');vencimentos=JP('vencimentos');trocas=JP('trocas')}
function JP(k){return JSON.parse(localStorage.getItem(k)||'[]')}
async function save(c,d){localStorage.setItem(c,JSON.stringify(d));if(db&&isOnline){try{updSync('sync');const o={};d.forEach(i=>o[i.id]=i);await db.ref(c).set(o);updSync('on')}catch(e){updSync('off')}}}
async function syncData(){if(db&&isOnline){updSync('sync');await loadAll();renderPage(currentPage);updSync('on');toast('✅ Sincronizado!','success')}}
function forceSync(){syncData()}

function gn(i){return i.nomeCompleto||[i.tipo,i.marca,i.volume,i.variacao].filter(Boolean).join(' ')||i.nome||''}
function getCodes(p){return p.codigos||(p.codigo?[p.codigo]:[])}
function hasCode(p,c){return getCodes(p).includes(c)}
function findByCode(c){return produtos.find(p=>hasCode(p,c))}
function fmtD(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function fmtDT(s){if(!s)return'';const d=new Date(s);return`${S(d.getDate())}/${S(d.getMonth()+1)}/${d.getFullYear()} ${S(d.getHours())}:${S(d.getMinutes())}`}
function S(n){return String(n).padStart(2,'0')}
function showLoad(t){document.getElementById('loadingText').textContent=t;document.getElementById('loading').classList.add('show')}
function hideLoad(){document.getElementById('loading').classList.remove('show')}
function toast(m,t='success'){const e=document.createElement('div');e.className=`toast ${t}`;e.textContent=m;document.getElementById('toastWrap').appendChild(e);setTimeout(()=>e.remove(),3500)}
function showModal(h){document.getElementById('modalContent').innerHTML=h;document.getElementById('modal').classList.add('show')}
function closeModal(){stopAllScan();document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
function updConn(){document.getElementById('connBanner').classList.toggle('show',!isOnline)}
function scanHTML(id,sid){return`<div class="scanner-wrap"><div id="${id}"></div><div class="scanner-status" id="${sid}">📷 Iniciando...</div></div>`}
function initScan(cid,cb,sid){stopScan(cid);const sc=new Html5Qrcode(cid);scanMap[cid]=sc;const st=document.getElementById(sid);if(st)st.textContent='📷 Iniciando...';sc.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:220},aspectRatio:1,formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.QR_CODE]},t=>{if(st)st.textContent='✅ '+t;cb(t)},()=>{}).then(()=>{if(st)st.textContent='📷 Aponte para o código'}).catch(e=>{if(st)st.textContent='❌ Câmera indisponível'})}
function stopScan(c){if(scanMap[c]){try{scanMap[c].stop().then(()=>{try{scanMap[c].clear()}catch(e){}delete scanMap[c]}).catch(()=>{delete scanMap[c]})}catch(e){delete scanMap[c]}}}
function stopAllScan(){Object.keys(scanMap).forEach(k=>stopScan(k))}

// ═══════════════════════════════════════════════════════
// BUSCA ONLINE MELHORADA — MÚLTIPLAS FONTES
// ═══════════════════════════════════════════════════════
async function buscarOnline(cod){
  if(!cod||cod.length<7)return;
  const c=document.getElementById('onlineRes');if(!c)return;
  c.style.display='block';

  // Mostra progresso de busca
  c.innerHTML=`<div class="search-progress" id="searchProg">
    <div style="font-size:15px;font-weight:800;color:var(--pri);margin-bottom:12px;text-align:center">🔍 Buscando produto...</div>
    <div style="font-family:monospace;text-align:center;font-size:16px;font-weight:700;color:var(--g700);margin-bottom:16px;padding:10px;background:var(--g100);border-radius:var(--r-xs)">${cod}</div>
    <div id="step1" class="search-step searching"><div class="step-spinner"></div>Open Food Facts</div>
    <div id="step2" class="search-step" style="opacity:.4">⏳ Open Beauty Facts</div>
    <div id="step3" class="search-step" style="opacity:.4">⏳ UPC Item DB</div>
    <div id="step4" class="search-step" style="opacity:.4">⏳ Cosmos (Brasil)</div>
    <div id="step5" class="search-step" style="opacity:.4">⏳ Busca Web (Google)</div>
  </div>`;

  let result = null;

  // 1. Open Food Facts
  result = await tryAPI(1, ()=>searchOpenFoodFacts(cod));
  if(result){showOnline(result);return}

  // 2. Open Beauty Facts
  result = await tryAPI(2, ()=>searchOpenBeautyFacts(cod));
  if(result){showOnline(result);return}

  // 3. UPC Item DB
  result = await tryAPI(3, ()=>searchUPCitemDB(cod));
  if(result){showOnline(result);return}

  // 4. Cosmos (Bluesoft) via proxy
  result = await tryAPI(4, ()=>searchCosmos(cod));
  if(result){showOnline(result);return}

  // 5. Busca Web via proxy (simula o Google)
  result = await tryAPI(5, ()=>searchWeb(cod));
  if(result){showOnline(result);return}

  // Nada encontrado
  c.innerHTML=`<div style="background:var(--war-l);border:2px solid var(--war);border-radius:var(--r-sm);padding:20px;margin-bottom:18px;text-align:center">
    <div style="font-size:32px;margin-bottom:8px">🔍</div>
    <div style="font-weight:800;color:var(--war);margin-bottom:8px">Produto não encontrado em nenhuma base</div>
    <div style="font-size:12px;color:var(--g600);margin-bottom:12px">Buscamos em 5 fontes diferentes sem resultado.<br>Preencha os dados manualmente.</div>
    <div style="font-family:monospace;font-size:14px;color:var(--g700)">${cod}</div>
  </div>`;
}

async function tryAPI(stepNum, fn){
  const el=document.getElementById('step'+stepNum);
  if(el){el.className='search-step searching';el.style.opacity='1';el.innerHTML=`<div class="step-spinner"></div>${el.textContent.replace(/[⏳✅❌🔍]/g,'').trim()}`}
  try{
    const r = await fn();
    if(r){
      if(el){el.className='search-step found';el.innerHTML=`✅ ${el.textContent.replace(/[⏳✅❌🔍]/g,'').trim()} — ENCONTRADO!`}
      return r;
    }else{
      if(el){el.className='search-step notfound';el.innerHTML=`❌ ${el.textContent.replace(/[⏳✅❌🔍]/g,'').trim()}`}
    }
  }catch(e){
    if(el){el.className='search-step error';el.innerHTML=`❌ ${el.textContent.replace(/[⏳✅❌🔍]/g,'').trim()} — erro`}
  }
  // Ativa próximo step visualmente
  const next=document.getElementById('step'+(stepNum+1));
  if(next)next.style.opacity='1';
  return null;
}

async function searchOpenFoodFacts(cod){
  const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${cod}.json`,{signal:AbortSignal.timeout(8000)});
  const d=await r.json();
  if(d.status===1&&d.product){
    const p=d.product;
    const nome=p.product_name_pt||p.product_name_pt_br||p.product_name||p.generic_name_pt||p.generic_name||'';
    const marca=p.brands||'';
    const imgs=[];
    if(p.image_front_url)imgs.push(p.image_front_url);
    if(p.image_url)imgs.push(p.image_url);
    if(p.image_front_small_url)imgs.push(p.image_front_small_url);
    if(p.selected_images?.front?.display?.pt)imgs.push(p.selected_images.front.display.pt);
    if(nome||marca)return{nome,marca,quantidade:p.quantity||'',categorias:p.categories||'',imagens:[...new Set(imgs)],fonte:'Open Food Facts',descricao:p.generic_name||''}
  }
  return null;
}

async function searchOpenBeautyFacts(cod){
  const r=await fetch(`https://world.openbeautyfacts.org/api/v0/product/${cod}.json`,{signal:AbortSignal.timeout(6000)});
  const d=await r.json();
  if(d.status===1&&d.product){
    const p=d.product;
    const nome=p.product_name_pt||p.product_name||'';
    const marca=p.brands||'';
    const imgs=[];if(p.image_front_url)imgs.push(p.image_front_url);if(p.image_url)imgs.push(p.image_url);
    if(nome||marca)return{nome,marca,quantidade:p.quantity||'',categorias:'Cosmético/Beleza',imagens:imgs,fonte:'Open Beauty Facts'}
  }
  return null;
}

async function searchUPCitemDB(cod){
  const r=await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${cod}`,{signal:AbortSignal.timeout(6000)});
  const d=await r.json();
  if(d.code==='OK'&&d.items?.length){
    const i=d.items[0];
    return{nome:i.title||'',marca:i.brand||'',quantidade:i.size||'',categorias:i.category||'',imagens:(i.images||[]).slice(0,6),fonte:'UPC Item DB',descricao:i.description||''}
  }
  return null;
}

async function searchCosmos(cod){
  try{
    // Cosmos/Bluesoft via AllOrigins proxy
    const url=`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.cosmos.bluesoft.com.br/gtins/'+cod+'.json')}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(d.contents){
      const data=JSON.parse(d.contents);
      if(data.description||data.brand?.name){
        const imgs=[];
        if(data.thumbnail)imgs.push(data.thumbnail);
        if(data.image)imgs.push(data.image); // campo extra se existir
        return{
          nome:data.description||'',
          marca:data.brand?.name||'',
          quantidade:data.net_content||data.quantity||'',
          categorias:data.ncm?.full_description||data.gpc?.description||'',
          imagens:imgs,
          fonte:'Cosmos (Brasil)',
          descricao:data.ncm?.full_description||''
        }
      }
    }
  }catch(e){}
  return null;
}

async function searchWeb(cod){
  try{
    // DuckDuckGo Instant Answer API via proxy
    const url=`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.duckduckgo.com/?q='+cod+'+produto+ean+barcode&format=json&no_redirect=1')}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(d.contents){
      const data=JSON.parse(d.contents);
      if(data.AbstractText||data.Heading){
        const imgs=[];
        if(data.Image)imgs.push(data.Image.startsWith('/')?'https://duckduckgo.com'+data.Image:data.Image);
        // Tenta extrair nome/marca do resultado
        const heading=data.Heading||'';
        const abstract=data.AbstractText||'';
        if(heading||abstract){
          return{
            nome:heading,marca:'',quantidade:'',categorias:'',
            imagens:imgs,fonte:'Busca Web',descricao:abstract.substring(0,200)
          }
        }
      }
      // Tenta resultados relacionados
      if(data.RelatedTopics?.length){
        const first=data.RelatedTopics[0];
        if(first.Text){
          const imgs=first.Icon?.URL?[first.Icon.URL.startsWith('/')?'https://duckduckgo.com'+first.Icon.URL:first.Icon.URL]:[];
          return{nome:first.Text.substring(0,80),marca:'',quantidade:'',categorias:'',imagens:imgs,fonte:'Busca Web',descricao:first.Text.substring(0,200)}
        }
      }
    }
  }catch(e){}

  // Fallback: tenta Google Shopping via proxy
  try{
    const url2=`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.google.com/search?q='+cod+'&tbm=shop&hl=pt-BR')}`;
    const r2=await fetch(url2,{signal:AbortSignal.timeout(8000)});
    const d2=await r2.json();
    if(d2.contents){
      // Extrai título do HTML
      const titleMatch=d2.contents.match(/<title[^>]*>([^<]+)<\/title>/i);
      if(titleMatch&&titleMatch[1]&&!titleMatch[1].includes('Google')){
        return{nome:titleMatch[1].replace(' - Google Shopping','').trim(),marca:'',quantidade:'',categorias:'',imagens:[],fonte:'Google Shopping'}
      }
      // Tenta extrair do meta
      const descMatch=d2.contents.match(/<meta name="description" content="([^"]+)"/i);
      if(descMatch&&descMatch[1]){
        return{nome:descMatch[1].substring(0,100),marca:'',quantidade:'',categorias:'',imagens:[],fonte:'Google',descricao:descMatch[1]}
      }
    }
  }catch(e){}

  return null;
}

async function dlImg(u){try{const img=new Image();img.crossOrigin='anonymous';img.onload=function(){try{const c=document.createElement('canvas');let w=img.width,h=img.height;const m=400;if(w>m||h>m){if(w>h){h=Math.round(h*m/w);w=m}else{w=Math.round(w*m/h);h=m}}c.width=w||400;c.height=h||400;c.getContext('2d').drawImage(img,0,0,c.width,c.height);curImg=c.toDataURL('image/jpeg',.8);const p=document.getElementById('imgPrev');if(p){p.innerHTML=`<img src="${curImg}">`;p.classList.add('has')}}catch(e){curImg=u}};img.onerror=()=>{curImg=u};img.src=u}catch(e){curImg=u}}

function renderBF(){const s=document.getElementById('buscaF').value.toLowerCase(),c=document.getElementById('resF');if(!s){c.innerHTML='';return}const r=produtos.filter(p=>p.nome.toLowerCase().includes(s)||(p.marca||'').toLowerCase().includes(s)||getCodes(p).some(c=>c.includes(s))).slice(0,10);if(!r.length){c.innerHTML=`<div class="empty"><div class="empty-text">Nenhum resultado</div></div>`;return}c.innerHTML=r.map(p=>{const im=p.imagem?`<img src="${p.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';return`<div class="prod-card clickable" onclick="openFaltaCom('${p.id}')"><div class="prod-img">${im}</div><div class="prod-info"><div class="prod-name">${gn(p)}</div></div><span style="color:var(--pri);font-size:20px">→</span></div>`}).join('')}
function openFaltaCom(pid){const p=produtos.find(x=>x.id===pid);if(!p)return;const dup=faltas.find(f=>f.produtoId===pid&&!f.pedido);if(dup&&!confirm(`Já existe falta para "${gn(p)}". Outra?`))return;const im=p.imagem?`<img src="${p.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';showModal(`<div class="modal-header"><div class="modal-title">➕ Falta</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div style="background:var(--pri-l);border:2px solid var(--pri);border-radius:var(--r);padding:18px;margin-bottom:22px"><div class="flex gap-14" style="align-items:center"><div class="prod-img" style="width:76px;height:76px;font-size:34px">${im}</div><div style="flex:1"><div style="font-size:16px;font-weight:800">${gn(p)}</div></div></div></div><div class="fg"><label class="fl">Prioridade</label><div class="prio-sel"><button class="prio-btn alta sel" onclick="setPrio(this,'alta')">🔴 Urgente</button><button class="prio-btn media" onclick="setPrio(this,'media')">🟡 Média</button><button class="prio-btn baixa" onclick="setPrio(this,'baixa')">🟢 Baixa</button></div><input type="hidden" id="fPrio" value="alta"></div><div style="background:var(--g50);border-radius:var(--r-sm);padding:16px;margin-bottom:18px;border:1px solid var(--g200)"><label class="fl mb-12">📦 Estoque</label><div class="flex gap-10"><div class="fg" style="flex:1;margin-bottom:0"><input type="number" class="fi" id="fQtd" value="0" min="0"></div><div class="fg" style="flex:1;margin-bottom:0"><select class="fs" id="fUnid"><option>UN</option><option>CX</option><option>PCT</option><option>KG</option><option>FD</option><option>DZ</option><option>LT</option></select></div></div></div><div style="background:var(--suc-l);border:2px solid var(--suc);border-radius:var(--r-sm);padding:16px;margin-bottom:18px"><label class="fl" style="color:var(--suc);margin-bottom:12px">📝 Sugestão</label><div class="flex gap-10 mb-12"><div class="fg" style="flex:1;margin-bottom:0"><input type="number" class="fi" id="sQtd" value="1" min="1" style="border-color:var(--suc)"></div><div class="fg" style="flex:1;margin-bottom:0"><select class="fs" id="sUnid" style="border-color:var(--suc)"><option>UN</option><option>CX</option><option>PCT</option><option>KG</option><option>FD</option><option>DZ</option><option>LT</option></select></div></div><textarea class="fi" id="fObs" placeholder="Obs..." style="min-height:60px;border-color:var(--suc)"></textarea></div><button class="btn btn-suc btn-block btn-lg" onclick="salvarFalta('${pid}')">✅ Registrar</button></div>`)}
function setPrio(b,v){document.querySelectorAll('.prio-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');document.getElementById('fPrio').value=v}
async function salvarFalta(pid){const p=produtos.find(x=>x.id===pid);if(!p)return;const now=new Date().toISOString();faltas.unshift({id:Date.now().toString(),produtoId:pid,nome:p.nome,tipo:p.tipo||'',marca:p.marca||'',volume:p.volume||'',variacao:p.variacao||'',codigo:getCodes(p)[0]||'',codigos:getCodes(p),imagem:p.imagem||'',nomeCompleto:gn(p),estoqueQtd:parseInt(document.getElementById('fQtd').value)||0,estoqueUnid:document.getElementById('fUnid').value,sugestaoQtd:parseInt(document.getElementById('sQtd').value)||1,sugestaoUnid:document.getElementById('sUnid').value,sugestaoObs:document.getElementById('fObs').value.trim(),prioridade:document.getElementById('fPrio').value,pedido:false,createdAt:now,dataRegistro:now});await save('faltas',faltas);closeModal();renderPage(currentPage);toast('✅ Falta registrada!','success');if(navigator.vibrate)navigator.vibrate(200)}
function setFF(c){document.querySelectorAll('#pageFaltas .chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');curFF=c.dataset.f;renderFaltas()}
function renderFaltas(){let l=[...faltas];if(['alta','media','baixa'].includes(curFF))l=l.filter(f=>f.prioridade===curFF);else if(curFF==='pedido')l=l.filter(f=>f.pedido);document.getElementById('faltasCount').textContent=`${faltas.length} itens`;const c=document.getElementById('listFaltas');if(!l.length){c.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma falta</div></div>`;return}c.innerHTML=l.map(f=>{const pc=f.prioridade==='alta'?'urgent':f.prioridade==='media'?'medium':'low';const bc=f.prioridade==='alta'?'b-dan':f.prioridade==='media'?'b-war':'b-suc';const pt=f.prioridade==='alta'?'URG':f.prioridade==='media'?'MÉD':'BAI';const im=f.imagem?`<img src="${f.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';return`<div class="prod-card ${pc}"><div class="prod-img">${f.pedido?'✅':im}</div><div class="prod-info"><div class="prod-name">${gn(f)}</div><div class="prod-meta blue">📅 ${fmtDT(f.dataRegistro||f.createdAt)}</div><div class="prod-meta">📦 ${f.estoqueQtd||0} ${f.estoqueUnid||'UN'}</div>${f.sugestaoQtd?`<div class="prod-meta green">📝 Pedir: ${f.sugestaoQtd} ${f.sugestaoUnid||'UN'}</div>`:''}</div><span class="prod-badge ${f.pedido?'b-info':bc}">${f.pedido?'✅':pt}</span></div><div class="card-actions">${!f.pedido?`<button class="act-btn add" onclick="markPed('${f.id}')">✅</button>`:`<button class="act-btn edit" onclick="markPed('${f.id}')">↩️</button>`}<button class="act-btn del" onclick="delFalta('${f.id}')">🗑️</button></div>`}).join('')}
async function markPed(id){const i=faltas.findIndex(f=>f.id===id);if(i>=0){faltas[i].pedido=!faltas[i].pedido;await save('faltas',faltas);renderFaltas();renderHome();toast(faltas[i].pedido?'✅':'↩️','success')}}
async function delFalta(id){if(!confirm('Excluir?'))return;faltas=faltas.filter(f=>f.id!==id);await save('faltas',faltas);renderFaltas();renderHome();toast('🗑️','success')}

function openRegistrarTroca(){showModal(`<div class="modal-header"><div class="modal-title">🔄 Troca</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div id="scanAT" style="display:none;margin-bottom:16px">${scanHTML('scT','stT')}<button class="btn btn-gray btn-block btn-sm" onclick="stopScan('scT');document.getElementById('scanAT').style.display='none'" style="margin-top:8px">✕</button></div><div id="scanRT" style="display:none"></div><div class="flex gap-8 mb-16"><div class="search-box" style="flex:1;margin-bottom:0"><span class="search-icon">🔍</span><input type="text" class="search-input" id="buscaT" placeholder="Buscar..." oninput="renderBT()"></div><button class="btn-scan" onclick="document.getElementById('scanAT').style.display='block';setTimeout(()=>initScan('scT',onScanT,'stT'),400)" style="background:linear-gradient(135deg,var(--ora),#c2410c)">📷</button></div><div id="resT"></div></div>`);setTimeout(()=>document.getElementById('buscaT')?.focus(),100)}
function onScanT(cod){stopScan('scT');document.getElementById('scanAT').style.display='none';if(navigator.vibrate)navigator.vibrate([100,50,100]);const f=findByCode(cod);const r=document.getElementById('scanRT');if(r)r.style.display='block';if(f){r.innerHTML=`<div class="found-card success"><div class="prod-img" style="width:56px;height:56px">${f.imagem?`<img src="${f.imagem}">`:'📦'}</div><div class="found-info"><div class="found-title">✅</div><div class="found-name">${gn(f)}</div></div></div>`;setTimeout(()=>openTrocaCom(f.id),600)}else r.innerHTML=`<div style="background:var(--war-l);border:2px solid var(--war);border-radius:var(--r-sm);padding:18px"><div style="font-weight:800;color:var(--war)">⚠️ Não cadastrado</div><div class="barcode-box">${cod}</div><button class="btn btn-suc btn-block" onclick="closeModal();openCadastro(null,'${cod}')">➕ Cadastrar</button></div>`}
function renderBT(){const s=document.getElementById('buscaT').value.toLowerCase(),c=document.getElementById('resT');if(!s){c.innerHTML='';return}const r=produtos.filter(p=>p.nome.toLowerCase().includes(s)||(p.marca||'').toLowerCase().includes(s)||getCodes(p).some(c=>c.includes(s))).slice(0,10);if(!r.length){c.innerHTML=`<div class="empty"><div class="empty-text">Nenhum</div></div>`;return}c.innerHTML=r.map(p=>{const im=p.imagem?`<img src="${p.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';return`<div class="prod-card clickable" onclick="openTrocaCom('${p.id}')"><div class="prod-img">${im}</div><div class="prod-info"><div class="prod-name">${gn(p)}</div></div><span style="color:var(--ora);font-size:20px">→</span></div>`}).join('')}
function openTrocaCom(pid){const p=produtos.find(x=>x.id===pid);if(!p)return;const dup=trocas.find(t=>t.produtoId===pid&&t.status==='pendente');if(dup&&!confirm(`Troca pendente existe. Outra?`))return;const im=p.imagem?`<img src="${p.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';showModal(`<div class="modal-header"><div class="modal-title">🔄 Troca</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div style="background:var(--ora-l);border:2px solid var(--ora);border-radius:var(--r);padding:18px;margin-bottom:22px"><div class="flex gap-14" style="align-items:center"><div class="prod-img" style="width:76px;height:76px;font-size:34px">${im}</div><div style="flex:1"><div style="font-size:16px;font-weight:800">${gn(p)}</div></div></div></div><div class="flex gap-10 mb-16"><div class="fg" style="flex:1;margin-bottom:0"><label class="fl">Qtd</label><input type="number" class="fi" id="tQtd" value="1" min="1"></div><div class="fg" style="flex:1;margin-bottom:0"><label class="fl">Unid</label><select class="fs" id="tUnid"><option>UN</option><option>CX</option><option>PCT</option><option>KG</option></select></div></div><div class="fg"><label class="fl">Motivo</label><input type="hidden" id="tMot" value="avaria"><button class="mot-btn sel avaria" onclick="setMot(this,'avaria')"><span class="mot-icon">💔</span><div class="mot-info"><div class="mot-title">Avaria</div></div></button><button class="mot-btn vencimento" onclick="setMot(this,'vencimento')"><span class="mot-icon">📅</span><div class="mot-info"><div class="mot-title">Vencimento</div></div></button><button class="mot-btn outros" onclick="setMot(this,'outros')"><span class="mot-icon">📝</span><div class="mot-info"><div class="mot-title">Outros</div></div></button></div><div class="fg" id="motODiv" style="display:none"><textarea class="fi" id="tMotO" placeholder="Motivo..."></textarea></div><button class="btn btn-ora btn-block btn-lg" onclick="salvarTroca('${pid}')">✅ Registrar</button></div>`)}
function setMot(b,v){document.querySelectorAll('.mot-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');document.getElementById('tMot').value=v;document.getElementById('motODiv').style.display=v==='outros'?'block':'none'}
async function salvarTroca(pid){const p=produtos.find(x=>x.id===pid);if(!p)return;const mot=document.getElementById('tMot').value,motO=document.getElementById('tMotO')?.value.trim()||'';if(mot==='outros'&&!motO){toast('Motivo!','error');return}const now=new Date().toISOString();trocas.unshift({id:Date.now().toString(),produtoId:pid,nome:p.nome,tipo:p.tipo||'',marca:p.marca||'',volume:p.volume||'',variacao:p.variacao||'',codigo:getCodes(p)[0]||'',codigos:getCodes(p),imagem:p.imagem||'',nomeCompleto:gn(p),quantidade:parseInt(document.getElementById('tQtd').value)||1,unidade:document.getElementById('tUnid').value,motivo:mot,motivoOutros:motO,status:'pendente',createdAt:now,dataRegistro:now});await save('trocas',trocas);closeModal();renderPage(currentPage);toast('✅ Troca!','success');if(navigator.vibrate)navigator.vibrate(200)}
function setTF(c){document.querySelectorAll('#pageTrocas .chip').forEach(x=>{x.classList.remove('active');x.classList.remove('ora')});c.classList.add('active','ora');curTF=c.dataset.t;renderTrocas()}
function renderTrocas(){let l=[...trocas];if(['pendente','enviado','concluido'].includes(curTF))l=l.filter(t=>t.status===curTF);else if(['avaria','vencimento'].includes(curTF))l=l.filter(t=>t.motivo===curTF);document.getElementById('trocasCount').textContent=`${trocas.length}`;const c=document.getElementById('listTrocas');if(!l.length){c.innerHTML=`<div class="empty"><div class="empty-icon">🔄</div><div class="empty-text">Nenhuma</div></div>`;return}c.innerHTML=l.map(t=>{const im=t.imagem?`<img src="${t.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';const mo=t.motivo==='avaria'?'💔 Avaria':t.motivo==='vencimento'?'📅 Vencido':`📝 ${t.motivoOutros||'Outros'}`;const sb=t.status==='pendente'?{c:'b-war',t:'⏳'}:t.status==='enviado'?{c:'b-info',t:'📦'}:{c:'b-suc',t:'✅'};let ab='';if(t.status==='pendente')ab=`<button class="act-btn edit" onclick="updTr('${t.id}','enviado')">📦</button>`;else if(t.status==='enviado')ab=`<button class="act-btn add" onclick="updTr('${t.id}','concluido')">✅</button>`;else ab=`<button class="act-btn gray" onclick="updTr('${t.id}','pendente')">↩️</button>`;return`<div class="prod-card troca ${t.status==='concluido'?'troca-done':''}"><div class="prod-img">${im}</div><div class="prod-info"><div class="prod-name">${gn(t)}</div><div class="prod-meta">📦 ${t.quantidade} ${t.unidade}</div><div class="prod-meta ora">${mo}</div><div class="prod-meta blue">📅 ${fmtDT(t.dataRegistro||t.createdAt)}</div></div><span class="prod-badge ${sb.c}">${sb.t}</span></div><div class="card-actions">${ab}<button class="act-btn del" onclick="delTr('${t.id}')">🗑️</button></div>`}).join('')}
async function updTr(id,s){const i=trocas.findIndex(t=>t.id===id);if(i>=0){trocas[i].status=s;await save('trocas',trocas);renderTrocas();renderHome();toast(s==='pendente'?'⏳':s==='enviado'?'📦':'✅','success')}}
async function delTr(id){if(!confirm('Excluir?'))return;trocas=trocas.filter(t=>t.id!==id);await save('trocas',trocas);renderTrocas();renderHome();toast('🗑️','success')}

// VENCIMENTOS
function setVF(c){document.querySelectorAll('#pageVencimentos .chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');curVF=c.dataset.v;renderVenc()}
function openAddVenc(){showModal(`<div class="modal-header"><div class="modal-title">📅 Vencimento</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div id="scanAV" style="display:none;margin-bottom:16px">${scanHTML('scV','stV')}<button class="btn btn-gray btn-block btn-sm" onclick="stopScan('scV');document.getElementById('scanAV').style.display='none'" style="margin-top:8px">✕</button></div><div id="scanRV" style="display:none"></div><div class="flex gap-8 mb-16"><div class="search-box" style="flex:1;margin-bottom:0"><span class="search-icon">🔍</span><input type="text" class="search-input" id="buscaV" placeholder="Buscar..." oninput="renderBV()"></div><button class="btn-scan" onclick="document.getElementById('scanAV').style.display='block';setTimeout(()=>initScan('scV',onScanV,'stV'),400)">📷</button></div><div id="resV"></div></div>`);setTimeout(()=>document.getElementById('buscaV')?.focus(),100)}
function onScanV(cod){stopScan('scV');document.getElementById('scanAV').style.display='none';if(navigator.vibrate)navigator.vibrate([100,50,100]);const f=findByCode(cod);const r=document.getElementById('scanRV');if(r)r.style.display='block';if(f){r.innerHTML=`<div class="found-card success"><div class="prod-img" style="width:56px;height:56px">${f.imagem?`<img src="${f.imagem}">`:'📦'}</div><div class="found-info"><div class="found-title">✅</div><div class="found-name">${gn(f)}</div></div></div>`;setTimeout(()=>openFormVenc(f.id),600)}else r.innerHTML=`<div style="background:var(--war-l);border:2px solid var(--war);border-radius:var(--r-sm);padding:18px"><div style="font-weight:800;color:var(--war)">⚠️ Não cadastrado</div><div class="barcode-box">${cod}</div><button class="btn btn-suc btn-block" onclick="closeModal();openCadastro(null,'${cod}')">➕</button></div>`}
function renderBV(){const s=document.getElementById('buscaV').value.toLowerCase(),c=document.getElementById('resV');if(!s){c.innerHTML='';return}const r=produtos.filter(p=>p.nome.toLowerCase().includes(s)||(p.marca||'').toLowerCase().includes(s)||getCodes(p).some(c=>c.includes(s))).slice(0,10);if(!r.length){c.innerHTML=`<div class="empty"><div class="empty-text">Nenhum</div></div>`;return}c.innerHTML=r.map(p=>{const im=p.imagem?`<img src="${p.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';return`<div class="prod-card clickable" onclick="openFormVenc('${p.id}')"><div class="prod-img">${im}</div><div class="prod-info"><div class="prod-name">${gn(p)}</div></div><span style="color:var(--suc)">+📅</span></div>`}).join('')}
function openFormVenc(pid){const p=produtos.find(x=>x.id===pid);if(!p)return;const im=p.imagem?`<img src="${p.imagem}">`:'📦';showModal(`<div class="modal-header"><div class="modal-title">📅 Vencimento</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="prod-card mb-20"><div class="prod-img">${im}</div><div class="prod-info"><div class="prod-name">${gn(p)}</div></div></div><div class="fg"><label class="fl">Validade *</label><input type="date" class="fi" id="vData"></div><div class="fg"><label class="fl">Qtd</label><input type="number" class="fi" id="vQtd" value="1" min="1"></div><button class="btn btn-suc btn-block btn-lg" onclick="saveVenc('${pid}')">✅ Salvar</button></div>`)}
async function saveVenc(pid){const p=produtos.find(x=>x.id===pid);const d=document.getElementById('vData').value,q=parseInt(document.getElementById('vQtd').value)||1;if(!d){toast('Data!','error');return}const dup=vencimentos.find(v=>v.produtoId===pid&&v.validade===d);if(dup){toast('⚠️ Já existe esta data','warning');return}vencimentos.push({id:Date.now().toString(),produtoId:pid,nome:p.nome,tipo:p.tipo||'',marca:p.marca||'',volume:p.volume||'',variacao:p.variacao||'',imagem:p.imagem||'',codigos:getCodes(p),nomeCompleto:gn(p),validade:d,quantidade:q,createdAt:new Date().toISOString()});await save('vencimentos',vencimentos);closeModal();renderVenc();renderHome();toast('✅','success')}
function renderVenc(){const hoje=new Date();hoje.setHours(0,0,0,0);let l=vencimentos.map(v=>({...v,dias:Math.ceil((new Date(v.validade)-hoje)/864e5)}));if(curVF==='vencidos')l=l.filter(v=>v.dias<0);else if(curVF==='7dias')l=l.filter(v=>v.dias>=0&&v.dias<=7);else if(curVF==='30dias')l=l.filter(v=>v.dias>=0&&v.dias<=30);l.sort((a,b)=>a.dias-b.dias);const c=document.getElementById('listVenc');if(!l.length){c.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Nenhum</div></div>`;return}c.innerHTML=l.map(v=>{const im=v.imagem?`<img src="${v.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';const isE=v.dias<0;return`<div class="prod-card ${isE?'expiring':''}"><div class="prod-img">${im}</div><div class="prod-info"><div class="prod-name">${gn(v)}</div><div class="prod-meta">📦 ${v.quantidade||1} • 📅 ${fmtD(v.validade)}</div></div><span class="prod-badge ${isE?'b-dan':v.dias<=7?'b-ora':'b-suc'}">${isE?'VENCIDO':v.dias===0?'HOJE':v.dias+'d'}</span></div><div class="card-actions"><button class="act-btn add" onclick="faltaVenc('${v.id}')">➕</button><button class="act-btn del" onclick="delVenc('${v.id}')">🗑️</button></div>`}).join('')}
async function faltaVenc(vid){const v=vencimentos.find(x=>x.id===vid);if(!v)return;const now=new Date().toISOString();faltas.unshift({id:Date.now().toString(),produtoId:v.produtoId,nome:v.nome,imagem:v.imagem,nomeCompleto:v.nomeCompleto,prioridade:'alta',pedido:false,createdAt:now,dataRegistro:now,estoqueQtd:0,estoqueUnid:'UN',sugestao:'Vencido'});await save('faltas',faltas);renderPage(currentPage);toast('✅','success')}
async function delVenc(id){if(!confirm('Excluir?'))return;vencimentos=vencimentos.filter(v=>v.id!==id);await save('vencimentos',vencimentos);renderVenc();renderHome();toast('🗑️','success')}

// CONFIG
function loadCfg(){config=JSON.parse(localStorage.getItem('config')||'{}');const $=id=>document.getElementById(id);if($('cfgLoja'))$('cfgLoja').value=config.loja||'';if($('cfgResp'))$('cfgResp').value=config.responsavel||'';if($('cfgDias'))$('cfgDias').value=config.diasVencimento||'7'}
function saveCfg(){config.loja=document.getElementById('cfgLoja').value;config.responsavel=document.getElementById('cfgResp').value;config.diasVencimento=document.getElementById('cfgDias').value;localStorage.setItem('config',JSON.stringify(config));renderHome()}
function exportBackup(){const b={v:'5.0',d:new Date().toISOString(),produtos,faltas,vencimentos,trocas,config};const bl=new Blob([JSON.stringify(b,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=`backup_${new Date().toISOString().split('T')[0]}.json`;a.click();toast('📤','success')}
function importBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const d=JSON.parse(ev.target.result);if(!confirm('Substituir?'))return;if(d.produtos){produtos=d.produtos;await save('produtos',produtos)}if(d.faltas){faltas=d.faltas;await save('faltas',faltas)}if(d.vencimentos){vencimentos=d.vencimentos;await save('vencimentos',vencimentos)}if(d.trocas){trocas=d.trocas;await save('trocas',trocas)}loadCfg();renderPage(currentPage);toast('📥','success')}catch(e){toast('❌','error')}};r.readAsText(f)}
async function clearAll(){if(!confirm('⚠️ Apagar?'))return;if(!confirm('CONFIRMAR?'))return;produtos=[];faltas=[];vencimentos=[];trocas=[];await Promise.all([save('produtos',[]),save('faltas',[]),save('vencimentos',[]),save('trocas',[])]);renderPage(currentPage);toast('🗑️','success')}

// PDF
function openPDFModal(){const h=new Date(),m=new Date();m.setMonth(m.getMonth()-1);showModal(`<div class="modal-header"><div class="modal-title">📄 PDF</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="date-range"><div class="date-range-title">📅 Período</div><div class="fg"><label class="fl">Início</label><input type="date" class="fi" id="pdfDi" value="${m.toISOString().split('T')[0]}"></div><div class="fg" style="margin-bottom:0"><label class="fl">Fim</label><input type="date" class="fi" id="pdfDf" value="${h.toISOString().split('T')[0]}"></div></div><button class="btn btn-pri btn-block btn-lg mb-12" onclick="pdfPer()">📄 Período</button><button class="btn btn-suc btn-block" onclick="pdfAll()">📄 Todas</button></div>`)}
function pdfPer(){const i=document.getElementById('pdfDi').value,f=document.getElementById('pdfDf').value;if(!i||!f)return;const di=new Date(i);di.setHours(0,0,0,0);const df=new Date(f);df.setHours(23,59,59,999);const fl=faltas.filter(x=>{const d=new Date(x.dataRegistro||x.createdAt);return d>=di&&d<=df});if(!fl.length){toast('Nenhuma','warning');return}mkPDF(fl,i,f);closeModal()}
function pdfAll(){if(!faltas.length){toast('Vazia','warning');return}mkPDF(faltas);closeModal()}
function mkPDF(list,pi,pf){const{jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFillColor(37,99,235);doc.rect(0,0,210,30,'F');doc.setTextColor(255);doc.setFontSize(18);doc.text('FALTAS',105,12,{align:'center'});doc.setFontSize(11);doc.text(config.loja||'Loja',105,20,{align:'center'});doc.setFontSize(10);doc.text(pi?`${fmtD(pi)} a ${fmtD(pf)}`:'Todas',105,27,{align:'center'});doc.autoTable({startY:35,head:[['#','Produto','Data','Est','Prio','Pedir']],body:list.map((f,i)=>[i+1,gn(f),fmtDT(f.dataRegistro||f.createdAt),`${f.estoqueQtd||0}`,f.prioridade==='alta'?'URG':'MÉD',`${f.sugestaoQtd||1}`]),headStyles:{fillColor:[37,99,235],fontSize:9},styles:{fontSize:8,cellPadding:3}});doc.save('faltas.pdf');toast('📄','success')}
function pdfTrocas(){if(!trocas.length)return;const{jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFillColor(234,88,12);doc.rect(0,0,210,30,'F');doc.setTextColor(255);doc.setFontSize(18);doc.text('TROCAS',105,12,{align:'center'});doc.autoTable({startY:35,head:[['#','Produto','Qtd','Motivo','Status']],body:trocas.filter(t=>t.status!=='concluido').map((t,i)=>[i+1,gn(t),t.quantidade,t.motivo,t.status]),headStyles:{fillColor:[234,88,12]},styles:{fontSize:8}});doc.save('trocas.pdf');toast('📄','success')}
function shareWhats(){if(!faltas.length)return;let t=`📦 *FALTAS*\n\n`;['alta','media','baixa'].forEach(p=>{const it=faltas.filter(f=>f.prioridade===p);if(it.length){t+=`${p==='alta'?'🔴':'🟡'}\n`;it.forEach((f,i)=>t+=`${i+1}. ${gn(f)} • Est:${f.estoqueQtd||0} Pedir:${f.sugestaoQtd||1}\n`);t+='\n'}});window.open(`https://wa.me/?text=${encodeURIComponent(t)}`)}
</script>
