<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e40af">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Controle de Faltas</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--pri:#2563eb;--pri-d:#1e40af;--pri-l:#dbeafe;--pri-xl:#eff6ff;
--suc:#16a34a;--suc-l:#dcfce7;--suc-xl:#f0fdf4;
--dan:#dc2626;--dan-l:#fee2e2;--dan-xl:#fef2f2;
--war:#f59e0b;--war-l:#fef3c7;--war-xl:#fffbeb;
--ora:#ea580c;--ora-l:#ffedd5;--ora-xl:#fff7ed;
--pur:#7c3aed;
--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;
--white:#fff;
--sh:0 4px 20px rgba(0,0,0,.06);--sh-lg:0 8px 30px rgba(0,0,0,.1);
--r:20px;--r-sm:14px;--r-xs:10px;--r-full:9999px;
--tr:all .2s cubic-bezier(.4,0,.2,1)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(170deg,#eef2ff,#f8fafc,#fdf2f8);color:var(--g800);min-height:100vh;padding-bottom:90px;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;padding:18px 20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(37,99,235,.25)}
.header-title{font-size:18px;font-weight:700}.header-sub{font-size:12px;opacity:.85;margin-top:2px}
.page{display:none;padding:16px;animation:fadeIn .3s}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hero{background:linear-gradient(135deg,#1e3a8a,#2563eb,#3b82f6);color:#fff;padding:32px 24px 36px;margin:-16px -16px 24px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60%;right:-25%;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-logo{font-size:48px;margin-bottom:6px;position:relative;z-index:1}
.hero-title{font-size:26px;font-weight:800;position:relative;z-index:1}
.hero-sub{font-size:13px;opacity:.85;margin-top:6px;position:relative;z-index:1}
.stats-row{display:flex;gap:10px;margin-top:24px;position:relative;z-index:1;justify-content:center;flex-wrap:wrap}
.stat-card{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);border-radius:var(--r-sm);padding:14px 18px;min-width:72px;text-align:center;cursor:pointer;transition:var(--tr)}
.stat-card:active{transform:scale(.95)}
.stat-num{font-size:28px;font-weight:800;line-height:1}
.stat-label{font-size:10px;opacity:.8;margin-top:4px;text-transform:uppercase}
.sync-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r-full);padding:8px 18px;font-size:12px;font-weight:600;margin-top:18px;cursor:pointer;position:relative;z-index:1}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
.sync-dot.off{background:#fbbf24;animation:none}
.sync-dot.syncing{background:#60a5fa;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.quick-btn{background:var(--white);border:none;border-radius:var(--r);padding:24px 14px;text-align:center;cursor:pointer;box-shadow:var(--sh);position:relative;overflow:hidden;transition:var(--tr)}
.quick-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0}
.quick-btn:active{transform:scale(.96)}
.quick-btn.primary{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff}
.quick-btn.success::before{background:var(--suc)}.quick-btn.warning::before{background:var(--war)}.quick-btn.orange::before{background:var(--ora)}
.quick-icon{font-size:34px;margin-bottom:10px}.quick-text{font-size:13px;font-weight:700}
.quick-btn.primary .quick-text{color:#fff}.quick-btn.success .quick-text{color:var(--suc)}.quick-btn.warning .quick-text{color:var(--war)}.quick-btn.orange .quick-text{color:var(--ora)}
.sec-actions{display:flex;gap:10px;margin-bottom:24px}
.sec-btn{flex:1;background:var(--white);border:none;border-radius:var(--r-sm);padding:14px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--g700);box-shadow:var(--sh);transition:var(--tr)}
.sec-btn:active{transform:scale(.97)}
.home-section{margin-bottom:24px}
.home-sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.home-sec-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.home-sec-count{font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--r-full);background:var(--g200);color:var(--g600)}
.home-sec-link{font-size:13px;font-weight:700;cursor:pointer;padding:8px 14px;border-radius:var(--r-full);border:none}
.home-sec-link.pri{background:var(--pri-l);color:var(--pri)}.home-sec-link.ora{background:var(--ora-l);color:var(--ora)}.home-sec-link.war{background:var(--war-l);color:var(--war)}
.carousel{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.carousel::-webkit-scrollbar{display:none}
.carousel-card{flex:0 0 260px;scroll-snap-align:start;background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid rgba(0,0,0,.05);cursor:pointer;position:relative;overflow:hidden;transition:var(--tr)}
.carousel-card:active{transform:scale(.97)}
.carousel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0}
.carousel-card.urgent::before{background:var(--dan)}.carousel-card.troca::before{background:var(--ora)}.carousel-card.venc-d::before{background:var(--dan)}.carousel-card.venc-w::before{background:var(--war)}
.cc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cc-img{width:50px;height:50px;border-radius:var(--r-xs);background:var(--g50);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;border:1px solid var(--g200)}
.cc-img img{width:100%;height:100%;object-fit:contain}
.cc-info{flex:1;min-width:0}.cc-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-sub{font-size:11px;color:var(--g500);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc-badge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:var(--r-full);white-space:nowrap;flex-shrink:0;text-transform:uppercase}
.cc-bottom{display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid var(--g100);font-size:11px}
.carousel-more{flex:0 0 120px;background:var(--g50);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:2px dashed var(--g300);min-height:140px}
.carousel-more:active{background:var(--g100)}.carousel-more-icon{font-size:28px;opacity:.6}.carousel-more-text{font-size:12px;font-weight:700;color:var(--g500);text-align:center}
.card{background:var(--white);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--sh);border:1px solid rgba(0,0,0,.04)}
.prod-card{background:var(--white);border-radius:var(--r-sm);padding:14px;margin-bottom:10px;border:1px solid var(--g200);display:flex;align-items:center;gap:14px;transition:var(--tr)}
.prod-card.urgent{border-left:4px solid var(--dan);background:var(--dan-xl)}
.prod-card.medium{border-left:4px solid var(--war);background:var(--war-xl)}
.prod-card.low{border-left:4px solid var(--suc);background:var(--suc-xl)}
.prod-card.expiring{border-left:4px solid var(--ora);background:var(--ora-xl)}
.prod-card.troca{border-left:4px solid var(--ora)}.prod-card.troca-done{opacity:.55}
.prod-card.clickable{cursor:pointer}.prod-card.clickable:active{transform:scale(.98)}
.prod-img{width:56px;height:56px;background:var(--g50);border-radius:var(--r-xs);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;border:1px solid var(--g200)}
.prod-img img{width:100%;height:100%;object-fit:contain}
.prod-info{flex:1;min-width:0}.prod-name{font-size:14px;font-weight:700;line-height:1.35}
.prod-meta{font-size:12px;color:var(--g500);margin-top:3px}.prod-meta.blue{color:var(--pri)}.prod-meta.green{color:var(--suc);font-weight:600}.prod-meta.ora{color:var(--ora);font-weight:600}
.prod-code{font-size:11px;color:var(--g400);margin-top:3px;font-family:monospace}
.prod-badge{font-size:10px;font-weight:800;padding:5px 12px;border-radius:var(--r-full);white-space:nowrap;flex-shrink:0;text-transform:uppercase}
.b-dan{background:var(--dan-l);color:var(--dan)}.b-war{background:var(--war-l);color:var(--war)}.b-suc{background:var(--suc-l);color:var(--suc)}.b-info{background:var(--pri-l);color:var(--pri)}.b-ora{background:var(--ora-l);color:var(--ora)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 22px;border-radius:var(--r-sm);font-size:15px;font-weight:700;border:none;cursor:pointer;transition:var(--tr);min-height:50px}
.btn:active{transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.btn-suc{background:linear-gradient(135deg,var(--suc),#15803d);color:#fff}.btn-dan{background:linear-gradient(135deg,var(--dan),#b91c1c);color:#fff}
.btn-ora{background:linear-gradient(135deg,var(--ora),#c2410c);color:#fff}.btn-gray{background:var(--g200);color:var(--g700)}
.btn-outline{background:#fff;color:var(--pri);border:2px solid var(--pri)}
.btn-scan{background:linear-gradient(135deg,var(--pur),#5b21b6);color:#fff;border:none;border-radius:var(--r-sm);padding:14px 18px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 14px rgba(124,58,237,.3);transition:var(--tr)}
.btn-scan:active{transform:scale(.96)}
.btn-block{width:100%}.btn-sm{padding:10px 16px;font-size:13px;min-height:42px}.btn-lg{padding:18px 28px;font-size:17px}
.fg{margin-bottom:18px}.fl{display:block;font-size:13px;font-weight:700;color:var(--g700);margin-bottom:8px}
.fi,.fs{width:100%;padding:14px 16px;border:2px solid var(--g200);border-radius:var(--r-sm);font-size:16px;background:var(--white);transition:var(--tr);-webkit-appearance:none}
.fi:focus,.fs:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 4px rgba(37,99,235,.1)}
.fi::placeholder{color:var(--g400)}
textarea.fi{min-height:100px;resize:vertical}
.search-box{position:relative;margin-bottom:16px}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px}
.search-input{width:100%;padding:14px 58px 14px 48px;border:2px solid var(--g200);border-radius:var(--r);font-size:16px;background:var(--white)}
.search-input:focus{outline:none;border-color:var(--pri)}
.scan-inline{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:linear-gradient(135deg,var(--pur),#5b21b6);border:none;border-radius:var(--r-xs);padding:8px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:var(--white);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.modal-header{padding:20px;border-bottom:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);z-index:10;border-radius:var(--r) var(--r) 0 0}
.modal-title{font-size:18px;font-weight:800}
.modal-close{width:38px;height:38px;border-radius:var(--r-xs);background:var(--g100);border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px}
.scanner-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:16px;background:#000}
.scanner-status{background:rgba(0,0,0,.85);color:#fff;padding:12px 16px;text-align:center;font-size:13px;font-weight:600}
.online-card{background:var(--white);border-radius:var(--r);border:2px solid var(--suc);overflow:hidden;margin-bottom:18px}
.online-header{background:var(--suc-l);padding:14px 18px;font-weight:700;color:var(--suc);font-size:14px}
.online-body{padding:18px}
.online-imgs{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px}
.online-imgs::-webkit-scrollbar{display:none}
.online-img{width:76px;height:76px;flex-shrink:0;border:2px solid var(--g200);border-radius:var(--r-xs);overflow:hidden;cursor:pointer;transition:var(--tr);background:var(--white)}
.online-img.sel{border-color:var(--pri);transform:scale(1.08)}
.online-img img{width:100%;height:100%;object-fit:contain}
.online-info p{margin-bottom:6px;font-size:13px}
.toast-wrap{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);z-index:2000;width:90%;max-width:400px}
.toast{padding:16px 22px;border-radius:var(--r-sm);color:#fff;font-weight:700;text-align:center;margin-bottom:8px;font-size:14px;animation:toastPop .3s;box-shadow:var(--sh-lg)}
@keyframes toastPop{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.toast.success{background:linear-gradient(135deg,var(--suc),#15803d)}.toast.error{background:linear-gradient(135deg,var(--dan),#b91c1c)}.toast.warning{background:linear-gradient(135deg,var(--war),#d97706)}.toast.info{background:linear-gradient(135deg,var(--pri),var(--pri-d))}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:3000}
.loading.show{display:flex}
.spinner{width:48px;height:48px;border:4px solid var(--g200);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--g700);font-weight:600}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);display:flex;border-top:1px solid var(--g200);z-index:100;padding:4px 6px env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;background:none;border:none;color:var(--g400);font-size:10px;font-weight:700;cursor:pointer;gap:3px;border-radius:var(--r-xs);transition:var(--tr)}
.tab-btn.active{color:var(--pri);background:var(--pri-xl)}.tab-icon{font-size:22px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:14px}.chips::-webkit-scrollbar{display:none}
.chip{padding:9px 18px;border-radius:var(--r-full);font-size:13px;font-weight:700;white-space:nowrap;background:var(--white);color:var(--g600);border:2px solid var(--g200);cursor:pointer;flex-shrink:0}
.chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}.chip.active.ora{background:var(--ora);border-color:var(--ora)}
.card-actions{display:flex;gap:8px;margin-bottom:12px;padding:10px 14px;background:var(--g50);border-radius:0 0 var(--r-sm) var(--r-sm);border:1px solid var(--g200);border-top:none;margin-top:-10px}
.act-btn{flex:1;padding:10px;border:none;border-radius:var(--r-xs);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:var(--tr)}
.act-btn:active{transform:scale(.95)}
.act-btn.edit{background:var(--pri-l);color:var(--pri)}.act-btn.del{background:var(--dan-l);color:var(--dan)}.act-btn.add{background:var(--suc-l);color:var(--suc)}.act-btn.ora{background:var(--ora-l);color:var(--ora)}.act-btn.gray{background:var(--g200);color:var(--g600)}
.prio-sel{display:flex;gap:10px}
.prio-btn{flex:1;padding:14px;border:2px solid var(--g200);border-radius:var(--r-sm);background:var(--white);cursor:pointer;text-align:center;font-size:12px;font-weight:700;transition:var(--tr)}
.prio-btn.alta.sel{border-color:var(--dan);background:var(--dan-l);color:var(--dan);transform:scale(1.05)}
.prio-btn.media.sel{border-color:var(--war);background:var(--war-l);color:var(--war);transform:scale(1.05)}
.prio-btn.baixa.sel{border-color:var(--suc);background:var(--suc-l);color:var(--suc);transform:scale(1.05)}
.mot-btn{width:100%;padding:16px;border:2px solid transparent;border-radius:var(--r-sm);background:var(--g50);cursor:pointer;text-align:left;font-weight:600;display:flex;align-items:center;gap:14px;margin-bottom:10px;color:var(--g600);transition:var(--tr)}
.mot-btn.sel.avaria{border-color:var(--dan);background:var(--dan-l);color:var(--dan)}.mot-btn.sel.vencimento{border-color:var(--war);background:var(--war-l);color:var(--war)}.mot-btn.sel.outros{border-color:var(--pri);background:var(--pri-l);color:var(--pri)}
.mot-icon{font-size:26px}.mot-info{flex:1}.mot-title{font-size:14px}.mot-desc{font-size:11px;opacity:.7;margin-top:3px}
.img-prev{width:130px;height:130px;margin:0 auto 18px;border-radius:var(--r-sm);background:var(--g50);display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden;border:2px dashed var(--g300)}
.img-prev img{width:100%;height:100%;object-fit:contain}.img-prev.has{border-style:solid;border-color:var(--suc);background:var(--suc-xl)}
.conn-banner{background:var(--war);color:#fff;padding:10px 16px;text-align:center;font-size:13px;font-weight:700;display:none;position:fixed;top:0;left:0;right:0;z-index:200}.conn-banner.show{display:block}
.empty{text-align:center;padding:44px 20px;color:var(--g400)}.empty-icon{font-size:52px;margin-bottom:14px;opacity:.7}.empty-text{font-size:14px;font-weight:600}
.barcode-box{background:var(--g100);border-radius:var(--r-xs);padding:14px;text-align:center;margin-bottom:14px;font-family:monospace;font-size:18px;font-weight:800;letter-spacing:3px;color:var(--g700);border:2px dashed var(--g300)}
.found-card{padding:16px;border-radius:var(--r-sm);margin-bottom:14px;display:flex;gap:14px;align-items:center}
.found-card.suc{background:var(--suc-l);border:2px solid var(--suc)}
.found-info{flex:1}.found-title{font-size:14px;font-weight:800;color:var(--suc)}.found-name{font-size:13px;font-weight:600;margin-top:4px}
.codes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.code-item{display:flex;align-items:center;gap:8px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r-xs);padding:10px 14px}
.code-item-text{flex:1;font-family:monospace;font-size:14px;font-weight:700;letter-spacing:1px}
.code-item-del{width:32px;height:32px;border-radius:var(--r-xs);background:var(--dan-l);color:var(--dan);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.date-range{background:var(--pri-l);border:2px solid var(--pri);border-radius:var(--r-sm);padding:18px;margin-bottom:18px}
.date-range-title{font-size:14px;font-weight:800;color:var(--pri);margin-bottom:12px}
/* Search progress */
.search-prog{margin-bottom:16px;background:var(--g50);border-radius:var(--r-sm);padding:16px;border:1px solid var(--g200)}
.search-prog-title{font-weight:800;color:var(--pri);margin-bottom:6px;font-size:14px;text-align:center}
.search-prog-code{font-family:monospace;text-align:center;font-size:16px;font-weight:700;color:var(--g700);margin-bottom:14px;padding:8px;background:var(--white);border-radius:var(--r-xs);border:1px solid var(--g200)}

// ════════════ SYNC ════════════
async function pull(){if(!db||!isOnline)return;try{setSS('syncing');const[a,b,c,d]=await Promise.all([db.ref('produtos').once('value'),db.ref('faltas').once('value'),db.ref('vencimentos').once('value'),db.ref('trocas').once('value')]);produtos=a.val()?Object.values(a.val()):[];faltas=b.val()?Object.values(b.val()):[];vencimentos=c.val()?Object.values(c.val()):[];trocas=d.val()?Object.values(d.val()):[];['produtos','faltas','vencimentos','trocas'].forEach(k=>localStorage.setItem(k,JSON.stringify(eval(k))));setSS('ok');renderPage(curPage)}catch(e){setSS('err')}}
async function push(col,data){localStorage.setItem(col,JSON.stringify(data));if(!db||!isOnline){setSS('off');return}try{setSS('syncing');_ignoreRT[col]=Date.now();const o={};data.forEach(i=>{if(i?.id)o[i.id]=i});await db.ref(col).set(o);setSS('ok')}catch(e){setSS('err')}}
function setupRT(){if(!db)return;['produtos','faltas','vencimentos','trocas'].forEach(col=>{db.ref(col).on('value',snap=>{if(Date.now()-(_ignoreRT[col]||0)<3000)return;const d=snap.val()?Object.values(snap.val()):[];if(col==='produtos')produtos=d;else if(col==='faltas')faltas=d;else if(col==='vencimentos')vencimentos=d;else trocas=d;localStorage.setItem(col,JSON.stringify(d));renderPage(curPage);toast('🔄 Atualizado por outro dispositivo','info')})})}
function setSS(s){const d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');if(!d)return;d.className='sync-dot';if(s==='ok'){t.textContent='Sincronizado ✓'}else if(s==='syncing'){d.classList.add('syncing');t.textContent='Sincronizando...'}else if(s==='off'){d.classList.add('off');t.textContent='Offline'}else{d.classList.add('off');t.textContent='Erro'}}
function forceSync(){pull().then(()=>toast('✅ Sincronizado!','success'))}
function loadLocal(){produtos=JP('produtos');faltas=JP('faltas');vencimentos=JP('vencimentos');trocas=JP('trocas')}

// ════════════ HELPERS ════════════
function gn(i){return i.nomeCompleto||[i.tipo,i.marca,i.volume,i.variacao].filter(Boolean).join(' ')||i.nome||''}
function getCodes(p){return Array.isArray(p?.codigos)?p.codigos:(p?.codigo?[p.codigo]:[])}
function findByCod(c){return produtos.find(p=>getCodes(p).includes(String(c)))}
function fmtD(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function fmtDT(s){if(!s)return'';const d=new Date(s);return`${P(d.getDate())}/${P(d.getMonth()+1)}/${d.getFullYear()} ${P(d.getHours())}:${P(d.getMinutes())}`}
function P(n){return String(n).padStart(2,'0')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function now(){return new Date().toISOString()}
function showLoad(t){document.getElementById('loadTxt').textContent=t;document.getElementById('loading').classList.add('show')}
function hideLoad(){document.getElementById('loading').classList.remove('show')}
function toast(m,t='success'){const e=document.createElement('div');e.className=`toast ${t}`;e.textContent=m;document.getElementById('toastWrap').appendChild(e);setTimeout(()=>e.remove(),3500)}

function scanHTML(id,sid){return`<div class="scanner-wrap"><div id="${id}"></div><div class="scanner-status" id="${sid}">📷 Iniciando...</div></div>`}
function initScan(cid,cb,sid){stopScan(cid);const sc=new Html5Qrcode(cid);scanMap[cid]=sc;const st=document.getElementById(sid);sc.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:220},aspectRatio:1,formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.QR_CODE]},t=>{if(st)st.textContent='✅ '+t;cb(t)},()=>{}).then(()=>{if(st)st.textContent='📷 Aponte para o código'}).catch(e=>{if(st)st.textContent='❌ Câmera indisponível'})}
function stopScan(c){if(scanMap[c]){try{scanMap[c].stop().then(()=>{try{scanMap[c].clear()}catch(e){}delete scanMap[c]}).catch(()=>{delete scanMap[c]})}catch(e){delete scanMap[c]}}}
function stopAllScan(){Object.keys(scanMap).forEach(k=>stopScan(k))}

// ═══════════════════════════════════════════════════
//  🔍 BUSCA ONLINE ULTRA — 8 FONTES DIFERENTES
// ═══════════════════════════════════════════════════

const SEARCH_SOURCES = [
  { name: 'Open Food Facts', icon: '🍎', fn: searchOFF },
  { name: 'Open Beauty Facts', icon: '💄', fn: searchOBF },
  { name: 'Open Pet Food Facts', icon: '🐾', fn: searchOPF },
  { name: 'UPC Item DB', icon: '🏷️', fn: searchUPC },
  { name: 'Barcode Lookup', icon: '📊', fn: searchBarcodeLookup },
  { name: 'Go-UPC', icon: '🔎', fn: searchGoUPC },
  { name: 'Cosmos Brasil 🇧🇷', icon: '🇧🇷', fn: searchCosmos },
  { name: 'Google Shopping', icon: '🛒', fn: searchGoogle },
];

async function buscarOnline(cod) {
  if (!cod || cod.length < 7) return;
  const c = document.getElementById('onlineRes');
  if (!c) return;
  c.style.display = 'block';

  // Monta UI de progresso
  c.innerHTML = `<div class="search-prog" id="searchProg">
    <div class="search-prog-title">🔍 Buscando produto...</div>
    <div class="search-prog-code">${cod}</div>
    ${SEARCH_SOURCES.map((s, i) => `
      <div class="sp-step" id="sp${i}">
        <div class="sp-dot wait" id="spd${i}">⏳</div>
        <span class="sp-name">${s.icon} ${s.name}</span>
        <span class="sp-detail" id="spdet${i}"></span>
      </div>
    `).join('')}
  </div>`;

  // Busca sequencial com fallback
  for (let i = 0; i < SEARCH_SOURCES.length; i++) {
    const src = SEARCH_SOURCES[i];
    const stepEl = document.getElementById('sp' + i);
    const dotEl = document.getElementById('spd' + i);
    const detEl = document.getElementById('spdet' + i);

    // Marca como running
    if (stepEl) stepEl.className = 'sp-step running';
    if (dotEl) { dotEl.className = 'sp-dot running'; dotEl.textContent = '🔄'; }

    try {
      const result = await src.fn(cod);
      if (result && (result.nome || result.marca)) {
        // ENCONTROU!
        if (dotEl) { dotEl.className = 'sp-dot found'; dotEl.textContent = '✅'; }
        if (stepEl) stepEl.className = 'sp-step found';
        if (detEl) detEl.textContent = '— ENCONTRADO!';
        showOnlineResult(result);
        return;
      } else {
        if (dotEl) { dotEl.className = 'sp-dot fail'; dotEl.textContent = '✗'; }
        if (stepEl) stepEl.className = 'sp-step fail';
        if (detEl) detEl.textContent = '— não encontrado';
      }
    } catch (e) {
      if (dotEl) { dotEl.className = 'sp-dot fail'; dotEl.textContent = '✗'; }
      if (stepEl) stepEl.className = 'sp-step fail';
      if (detEl) detEl.textContent = '— erro';
    }
  }

  // Nenhum encontrou
  c.innerHTML = `<div style="background:var(--war-l);border:2px solid var(--war);border-radius:var(--r-sm);padding:20px;text-align:center;margin-bottom:18px">
    <div style="font-size:32px;margin-bottom:8px">🔍</div>
    <div style="font-weight:800;color:var(--war);margin-bottom:8px">Não encontrado em nenhuma das 8 fontes</div>
    <div style="font-size:12px;color:var(--g600);margin-bottom:12px">
      Buscamos em Open Food Facts, Open Beauty Facts, Open Pet Food Facts, UPC Item DB,
      Barcode Lookup, Go-UPC, Cosmos Brasil e Google Shopping.
      <br>Preencha os dados manualmente.
    </div>
  </div>`;
}

// 1. Open Food Facts
async function searchOFF(cod) {
  const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${cod}.json`, { signal: AbortSignal.timeout(8000) });
  const d = await r.json();
  if (d.status === 1 && d.product) {
    const p = d.product;
    const nome = p.product_name_pt || p.product_name_pt_br || p.product_name || p.generic_name || '';
    const marca = p.brands || '';
    const imgs = [...new Set([p.image_front_url, p.image_url, p.image_front_small_url].filter(Boolean))];
    if (nome || marca) return { nome, marca, quantidade: p.quantity || '', imagens: imgs, fonte: 'Open Food Facts' };
  }
  return null;
}

// 2. Open Beauty Facts

  const d = await r.json();
  if (d.status === 1 && d.product) {
    const p = d.product;
    const nome = p.product_name_pt || p.product_name || '';
    const marca = p.brands || '';
    const imgs = [p.image_front_url, p.image_url].filter(Boolean);
    if (nome || marca) return { nome, marca, quantidade: p.quantity || '', imagens: imgs, fonte: 'Open Beauty Facts' };
  }

}

// 3. Open Pet Food Facts

// 4. UPC Item DB
async function searchUPC(cod) {
  const r = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${cod}`, { signal: AbortSignal.timeout(7000) });
  const d = await r.json();
  if (d.code === 'OK' && d.items?.length) {
    const i = d.items[0];
    return { nome: i.title || '', marca: i.brand || '', quantidade: i.size || '', imagens: (i.images || []).slice(0, 6), fonte: 'UPC Item DB', descricao: i.description || '' };
  }
  return null;
}

// 5. Barcode Lookup (via proxy)
async function searchBarcodeLookup(cod) {
  try {
    const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.barcodelookup.com/${cod}`)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
    const d = await r.json();
    if (d.contents) {
      const html = d.contents;
      // Extrai título do produto
      const titleMatch = html.match(/<h4[^>]*class="product-name"[^>]*>([^<]+)<\/h4>/i)
        || html.match(/<title>([^<]+)<\/title>/i);
      const imgMatch = html.match(/<img[^>]+class="product-image"[^>]+src="([^"]+)"/i)
        || html.match(/<meta property="og:image" content="([^"]+)"/i);

      if (titleMatch && titleMatch[1] && !titleMatch[1].includes('Barcode Lookup')) {
        const nome = titleMatch[1].replace(/\s*\|.*/, '').replace(/\s*-\s*Barcode.*/, '').trim();
        const imgs = imgMatch ? [imgMatch[1]] : [];
        if (nome.length > 3) return { nome, marca: '', quantidade: '', imagens: imgs, fonte: 'Barcode Lookup' };
      }
    }

// 6. Go-UPC (via proxy)
async function searchGoUPC(cod) {
  try {
    const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://go-upc.com/barcode/${cod}`)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
    const d = await r.json();
    if (d.contents) {
      const html = d.contents;
      const nameMatch = html.match(/<h1[^>]*>([^<]+)<\/h1>/i)
        || html.match(/<span[^>]*class="product-name"[^>]*>([^<]+)<\/span>/i);
      const imgMatch = html.match(/<img[^>]+src="(https:\/\/go-upc\.com\/media[^"]+)"/i)
        || html.match(/<meta property="og:image" content="([^"]+)"/i);

      if (nameMatch && nameMatch[1]) {
        const nome = nameMatch[1].replace(/\s*\|.*/, '').replace(/Go-UPC/gi, '').trim();
        const imgs = imgMatch ? [imgMatch[1]] : [];
        if (nome.length > 3 && !nome.includes('Barcode')) return { nome, marca: '', quantidade: '', imagens: imgs, fonte: 'Go-UPC' };
      }
    }
  } catch (e) {}
  return null;
}

// 8. Google Shopping (via proxy — extrai do HTML)
async function searchGoogle(cod) {
  try {
    // Tenta Google Shopping
    const url1 = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.google.com.br/search?q=${cod}&tbm=shop&hl=pt-BR`)}`;
    const r1 = await fetch(url1, { signal: AbortSignal.timeout(12000) });
    const d1 = await r1.json();
    if (d1.contents) {
      const html = d1.contents;

      // Tenta extrair primeiro resultado do Google Shopping
      // Padrão: <a class="..." aria-label="NOME DO PRODUTO"
      const ariaMatch = html.match(/aria-label="([^"]{5,120})"/i);
      if (ariaMatch && ariaMatch[1] && !ariaMatch[1].includes('Google') && !ariaMatch[1].includes('Pesquis')) {
        // Tenta extrair imagem
        const imgMatches = [...html.matchAll(/src="(https:\/\/encrypted-tbn[^"]+)"/gi)];
        const imgs = imgMatches.slice(0, 3).map(m => m[1]);
        return { nome: ariaMatch[1].trim(), marca: '', quantidade: '', imagens: imgs, fonte: 'Google Shopping 🛒' };
      }

      // Fallback: tenta og:description ou meta description
      const descMatch = html.match(/<meta[^>]+name="description"[^>]+content="([^"]+)"/i)
        || html.match(/<meta[^>]+property="og:description"[^>]+content="([^"]+)"/i);
      if (descMatch && descMatch[1] && descMatch[1].length > 10) {
        return { nome: descMatch[1].substring(0, 100), marca: '', quantidade: '', imagens: [], fonte: 'Google', descricao: descMatch[1] };
      }
    }
  } catch (e) {}

  // Fallback 2: Google normal
  try {
    const url2 = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.google.com.br/search?q=${cod}+produto+ean&hl=pt-BR`)}`;
    const r2 = await fetch(url2, { signal: AbortSignal.timeout(10000) });
    const d2 = await r2.json();
    if (d2.contents) {
      const html = d2.contents;
      // Tenta extrair do title ou h3
      const h3Match = html.match(/<h3[^>]*>([^<]{5,100})<\/h3>/i);
      if (h3Match && h3Match[1] && !h3Match[1].includes('Google')) {
        return { nome: h3Match[1].trim(), marca: '', quantidade: '', imagens: [], fonte: 'Google Web 🌐' };
      }
    }
  } catch (e) {}

  return null;
}

async function dlImg(u) { try { const img = new Image(); img.crossOrigin = 'anonymous'; img.onload = function () { try { const c = document.createElement('canvas'); let w = img.width, h = img.height; const m = 400; if (w > m || h > m) { if (w > h) { h = Math.round(h * m / w); w = m } else { w = Math.round(w * m / h); h = m } } c.width = w || 400; c.height = h || 400; c.getContext('2d').drawImage(img, 0, 0, c.width, c.height); curImg = c.toDataURL('image/jpeg', .8); const p = document.getElementById('imgPrev'); if (p) { p.innerHTML = `<img src="${curImg}">`; p.classList.add('has') } } catch (e) { curImg = u } }; img.onerror = () => { curImg = u }; img.src = u } catch (e) { curImg = u } }

function oSV(cod){stopScan('scV');document.getElementById('sAV').style.display='none';const f=findByCod(cod);const r=document.getElementById('sRV');r.style.display='block';if(f){r.innerHTML=`<div class="found-card suc"><div class="prod-img" style="width:52px;height:52px">${f.imagem?`<img src="${f.imagem}">`:'📦'}</div><div class="found-info"><div class="found-title">✅</div><div class="found-name">${gn(f)}</div></div></div>`;setTimeout(()=>openFormVenc(f.id),700)}else r.innerHTML=`<div style="background:var(--war-l);border:2px solid var(--war);border-radius:var(--r-sm);padding:16px;text-align:center"><div class="barcode-box">${cod}</div><button class="btn btn-suc btn-block" onclick="closeModal();openCadastro(null,'${cod}')">➕ Cadastrar</button></div>`}

function openFormVenc(pid){const p=produtos.find(x=>x.id===pid);if(!p)return;const im=p.imagem?`<img src="${p.imagem}">`:'📦';showModal(`<div class="modal-header"><div class="modal-title">📅 ${gn(p)}</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="prod-card" style="margin-bottom:20px"><div class="prod-img">${im}</div><div class="prod-info"><div class="prod-name">${gn(p)}</div></div></div><div class="fg"><label class="fl">Validade *</label><input type="date" class="fi" id="vD"></div><div class="fg"><label class="fl">Qtd</label><input type="number" class="fi" id="vQ" value="1" min="1"></div><button class="btn btn-suc btn-block btn-lg" onclick="sV('${pid}')">✅ Salvar</button></div>`)}
async function sV(pid){const p=produtos.find(x=>x.id===pid);const d=document.getElementById('vD').value;const q=parseInt(document.getElementById('vQ').value)||1;if(!d){toast('Data!','error');return}const dup=vencimentos.find(v=>v.produtoId===pid&&v.validade===d);if(dup){toast('⚠️ Já existe','warning');return}vencimentos.push({id:uid(),produtoId:pid,nome:p.nome,tipo:p.tipo||'',marca:p.marca||'',volume:p.volume||'',variacao:p.variacao||'',imagem:p.imagem||'',codigos:getCodes(p),nomeCompleto:gn(p),validade:d,quantidade:q,createdAt:now()});closeModal();renderVenc();renderHome();await push('vencimentos',vencimentos);toast('✅ Salvo!','success')}
function renderVenc(){const hoje=new Date();hoje.setHours(0,0,0,0);let l=vencimentos.map(v=>({...v,dias:Math.ceil((new Date(v.validade)-hoje)/864e5)}));if(curVF==='vencidos')l=l.filter(v=>v.dias<0);else if(curVF==='7dias')l=l.filter(v=>v.dias>=0&&v.dias<=7);else if(curVF==='30dias')l=l.filter(v=>v.dias>=0&&v.dias<=30);l.sort((a,b)=>a.dias-b.dias);const c=document.getElementById('listVenc');if(!l.length){c.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Nenhum</div></div>`;return}c.innerHTML=l.map(v=>{const im=v.imagem?`<img src="${v.imagem}" onerror="this.parentElement.innerHTML='📦'">`:'📦';const isE=v.dias<0;return`<div class="prod-card ${isE?'expiring':''}"><div class="prod-img">${im}</div><div class="prod-info"><div class="prod-name">${gn(v)}</div><div class="prod-meta">📦 ${v.quantidade||1} • 📅 ${fmtD(v.validade)}</div></div><span class="prod-badge ${isE?'b-dan':v.dias<=7?'b-ora':'b-suc'}">${isE?'VENC':v.dias===0?'HOJE':v.dias+'d'}</span></div><div class="card-actions"><button class="act-btn add" onclick="fV('${v.id}')">➕ Falta</button><button class="act-btn del" onclick="dV('${v.id}')">🗑️</button></div>`}).join('')}
async function fV(vid){const v=vencimentos.find(x=>x.id===vid);if(!v)return;const n=now();faltas.unshift({id:uid(),produtoId:v.produtoId,nome:v.nome,imagem:v.imagem,nomeCompleto:gn(v),codigos:v.codigos||[],prioridade:'alta',pedido:false,createdAt:n,dataRegistro:n,estoqueQtd:0,estoqueUnid:'UN',sugestaoQtd:1,sugestaoUnid:'UN'});renderPage(curPage);await push('faltas',faltas);toast('✅ Falta criada!','success')}
async function dV(id){if(!confirm('Excluir?'))return;vencimentos=vencimentos.filter(v=>v.id!==id);renderVenc();renderHome();await push('vencimentos',vencimentos);toast('🗑️','success')}

function loadCfg(){cfg=JSON.parse(localStorage.getItem('config')||'{}');const $=id=>document.getElementById(id);if($('cfgLoja'))$('cfgLoja').value=cfg.loja||'';if($('cfgResp'))$('cfgResp').value=cfg.responsavel||'';if($('cfgDias'))$('cfgDias').value=cfg.diasVencimento||'7'}
function saveCfg(){cfg.loja=document.getElementById('cfgLoja').value;cfg.responsavel=document.getElementById('cfgResp').value;cfg.diasVencimento=document.getElementById('cfgDias').value;localStorage.setItem('config',JSON.stringify(cfg));renderHome()}
function exportBackup(){const b={v:'7.0',d:now(),produtos,faltas,vencimentos,trocas,config:cfg};const bl=new Blob([JSON.stringify(b,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=`backup_${new Date().toISOString().split('T')[0]}.json`;a.click();toast('📤','success')}
function importBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const d=JSON.parse(ev.target.result);if(!confirm('Substituir tudo?'))return;if(d.produtos){produtos=d.produtos;await push('produtos',produtos)}if(d.faltas){faltas=d.faltas;await push('faltas',faltas)}if(d.vencimentos){vencimentos=d.vencimentos;await push('vencimentos',vencimentos)}if(d.trocas){trocas=d.trocas;await push('trocas',trocas)}loadCfg();renderPage(curPage);toast('📥','success')}catch(e){toast('❌','error')}};r.readAsText(f)}
async function clearAll(){if(!confirm('⚠️ APAGAR TUDO?')||!confirm('CONFIRMAR?'))return;produtos=[];faltas=[];vencimentos=[];trocas=[];await Promise.all([push('produtos',[]),push('faltas',[]),push('vencimentos',[]),push('trocas',[])]);renderPage(curPage);toast('🗑️','success')}

// ════════════ PDF / WHATS ════════════
function openPDFModal(){const h=new Date(),m=new Date();m.setMonth(m.getMonth()-1);showModal(`<div class="modal-header"><div class="modal-title">📄 PDF</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="date-range"><div class="date-range-title">📅 Período</div><div class="fg"><label class="fl">Início</label><input type="date" class="fi" id="pDi" value="${m.toISOString().split('T')[0]}"></div><div class="fg" style="margin-bottom:0"><label class="fl">Fim</label><input type="date" class="fi" id="pDf" value="${h.toISOString().split('T')[0]}"></div></div><button class="btn btn-pri btn-block btn-lg mb-12" onclick="pdfP()">📄 Período</button><button class="btn btn-suc btn-block" onclick="pdfA()">📄 Todas</button></div>`)}
function pdfP(){const i=document.getElementById('pDi').value,f=document.getElementById('pDf').value;if(!i||!f)return;const di=new Date(i);di.setHours(0,0,0,0);const df=new Date(f);df.setHours(23,59,59,999);const fl=faltas.filter(x=>{const d=new Date(x.dataRegistro||x.createdAt);return d>=di&&d<=df});if(!fl.length){toast('Nenhuma','warning');return}mkPDF(fl,i,f);closeModal()}
function pdfA(){if(!faltas.length)return;mkPDF(faltas);closeModal()}
function mkPDF(list,pi,pf){const{jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFillColor(37,99,235);doc.rect(0,0,210,30,'F');doc.setTextColor(255);doc.setFontSize(18);doc.text('FALTAS',105,12,{align:'center'});doc.setFontSize(11);doc.text(cfg.loja||'Loja',105,20,{align:'center'});doc.setFontSize(10);doc.text(pi?`${fmtD(pi)} a ${fmtD(pf)}`:'Todas',105,27,{align:'center'});doc.autoTable({startY:35,head:[['#','Produto','Data','Est','Prio','Pedir']],body:list.map((f,i)=>[i+1,gn(f),fmtDT(f.dataRegistro),`${f.estoqueQtd||0}`,f.prioridade==='alta'?'URG':'MÉD',`${f.sugestaoQtd||1}`]),headStyles:{fillColor:[37,99,235],fontSize:9},styles:{fontSize:8,cellPadding:3}});doc.save('faltas.pdf');toast('📄','success')}
function pdfTrocas(){if(!trocas.length)return;const{jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFillColor(234,88,12);doc.rect(0,0,210,30,'F');doc.setTextColor(255);doc.setFontSize(18);doc.text('TROCAS',105,12,{align:'center'});doc.autoTable({startY:35,head:[['#','Produto','Qtd','Motivo','Status']],body:trocas.filter(t=>t.status!=='concluido').map((t,i)=>[i+1,gn(t),t.quantidade,t.motivo,t.status]),headStyles:{fillColor:[234,88,12]},styles:{fontSize:8}});doc.save('trocas.pdf');toast('📄','success')}
function shareWhats(){if(!faltas.length)return;let t=`📦 *FALTAS*\n\n`;['alta','media','baixa'].forEach(p=>{const it=faltas.filter(f=>f.prioridade===p);if(it.length){t+=`${p==='alta'?'🔴':'🟡'}\n`;it.forEach((f,i)=>t+=`${i+1}. ${gn(f)} Est:${f.estoqueQtd||0} Pedir:${f.sugestaoQtd||1}\n`);t+='\n'}});window.open(`https://wa.me/?text=${encodeURIComponent(t)}`)}
</script>
